    - name: 7.22 - Create comprehensive LVM report
      ansible.builtin.copy:
        content: |
          ==========================================
          LVM MANAGEMENT REPORT
          ==========================================
          Generated on: {{ ansible_date_time.iso8601 }}
          Hostname: {{ inventory_hostname }}
          OS: {{ ansible_os_family }} {{ ansible_distribution_version }}
          
          ==========================================
          LVM ARCHITECTURE
          ==========================================
          
          LVM Hierarchy:
          Physical Disks/Partitions
          ↓
          Physical Volumes (PV)
          ↓
          Volume Groups (VG) - Pools
          ↓
          Logical Volumes (LV) - Virtual partitions
          ↓
          Filesystems
          ↓
          Mount Points
          
          ==========================================
          CURRENT LVM CONFIGURATION
          ==========================================
          
          Physical Volumes:
          {{ existing_pvs.stdout }}
          
          Volume Groups:
          {{ existing_vgs.stdout }}
          
          Logical Volumes:
          {{ existing_lvs.stdout }}
          
          ==========================================
          LVM COMPONENTS
          ==========================================
          
          Physical Volume (PV):
          - Physical disk or partition
          - Contains LVM metadata
          - Divided into physical extents (PE)
          - Minimum 1MB size
          - Can be partitioned or whole disk
          
          Volume Group (VG):
          - Pool of PVs
          - Contains LVs
          - Manages space allocation
          - Can be extended by adding PVs
          - Can be reduced by removing PVs
          
          Logical Volume (LV):
          - Virtual partition
          - Created from VG pool
          - Can be resized online
          - Can have snapshots
          - Contains filesystem
          
          ==========================================
          LVM OPERATIONS
          ==========================================
          
          Creating LVM:
          1. Create Physical Volumes
             $ pvcreate /dev/sdb
          
          2. Create Volume Group
             $ vgcreate data_vg /dev/sdb
          
          3. Create Logical Volumes
             $ lvcreate -L 10G -n lv_data data_vg
          
          4. Create Filesystem
             $ mkfs.ext4 /dev/data_vg/lv_data
          
          5. Mount Volume
             $ mount /dev/data_vg/lv_data /mnt/data
          
          Managing LVM:
          - Extend: lvextend + resize2fs/xfs_growfs
          - Reduce: umount + resize + lvreduce
          - Snapshot: lvcreate -s
          - Move: pvmove
          - Delete: lvremove, vgremove, pvremove
          
          ==========================================
          MONITORING
          ==========================================
          
          Quick view:
          $ pvs, vgs, lvs
          
          Detailed view:
          $ pvdisplay, vgdisplay, lvdisplay
          
          Custom output:
          $ lvs -o lv_name,lv_size,data_percent
          
          Monitor usage:
          $ watch -n 5 'lvs -o lv_name,lv_size,data_percent'
          
          Check free space:
          $ vgs -o vg_name,vg_free
          
          ==========================================
          SNAPSHOTS
          ==========================================
          
          Create snapshot:
          $ lvcreate -L 2G -s -n snap /dev/data_vg/lv_data
          
          Mount snapshot:
          $ mount /dev/data_vg/snap /mnt/snap
          
          Backup from snapshot:
          $ tar -czf backup.tar.gz /mnt/snap/*
          
          Remove snapshot:
          $ lvremove /dev/data_vg/snap
          
          ==========================================
          THIN PROVISIONING
          ==========================================
          
          Create thin pool:
          $ lvcreate -T -L 50G data_vg/thin_pool
          
          Create thin volume:
          $ lvcreate -V 100G -T data_vg/thin_pool -n thin_vol
          
          Monitor thin pool:
          $ lvs -o lv_name,lv_size,data_percent data_vg
          
          ⚠️ Monitor pool usage constantly!
          
          ==========================================
          BACKUP & RECOVERY
          ==========================================
          
          Backup metadata:
          $ vgcfgbackup data_vg
          $ cp /etc/lvm/backup/data_vg /backup/
          
          Backup LVM config:
          $ tar -czf /backup/lvm_config.tar.gz /etc/lvm/
          
          Restore metadata:
          $ vgcfgrestore -f /backup/data_vg data_vg
          
          ==========================================
          BEST PRACTICES
          ==========================================
          
          Planning:
          ✓ Document layout
          ✓ Plan for growth
          ✓ Keep >10% free
          ✓ Use descriptive names
          
          Creation:
          ✓ Create snapshots before changes
          ✓ Test on non-prod
          ✓ Use RAID for redundancy
          ✓ Backup metadata
          
          Monitoring:
          ✓ Watch free space
          ✓ Monitor snapshots
          ✓ Check thin pools
          ✓ Set alerts
          ✓ Regular backups
          
          ==========================================
          NEXT STEPS
          ==========================================
          
          1. Review current LVM configuration
          2. Plan VG/LV layout for environment
          3. Create test setup
          4. Monitor regularly
          5. Implement backups
          6. Document procedures
          7. Train team
          8. Test disaster recovery
          
          ==========================================
