          Step 2: Create volume group
          $ vgcreate data_vg /dev/sdb /dev/sdc
          $ vgdisplay data_vg
          
          Step 3: Create logical volumes
          $ lvcreate -L 5G -n lv_data data_vg
          $ lvcreate -L 3G -n lv_backup data_vg
          $ lvdisplay
          
          Step 4: Create filesystems
          $ mkfs.ext4 /dev/data_vg/lv_data
          $ mkfs.ext4 /dev/data_vg/lv_backup
          
          Step 5: Mount volumes
          $ mount /dev/data_vg/lv_data /mnt/data
          $ mount /dev/data_vg/lv_backup /mnt/backup
          
          Step 6: Update /etc/fstab
          /dev/data_vg/lv_data    /mnt/data    ext4    defaults    0    2
          /dev/data_vg/lv_backup  /mnt/backup  ext4    defaults    0    2
          
          Step 7: Verify setup
          $ df -h | grep /mnt
          $ lvs -o lv_name,lv_size,lv_attr
          
          Extending volumes:
          $ lvextend -L +2G /dev/data_vg/lv_data
          $ resize2fs /dev/data_vg/lv_data
          
          Creating snapshots:
