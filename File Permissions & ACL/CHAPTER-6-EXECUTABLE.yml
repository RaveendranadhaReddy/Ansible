    - name: 6.32 - Show filesystem performance
      ansible.builtin.debug:
        msg: |
          ==========================================
          FILESYSTEM PERFORMANCE MONITORING
          ==========================================
          
          Tools:
          iostat - I/O statistics
          iotop - I/O top processes
          systat - System activity
          
          Key Metrics:
          - Read/write throughput (MB/s)
          - I/O operations per second (IOPS)
          - Average wait time (ms)
          - CPU usage by I/O
          
          Commands:
          $ iostat 1 10        (10 samples, 1 sec apart)
          $ iostat -x 1        (extended stats)
          $ iotop -o           (only I/O processes)
          
          Watch for:
          - High wait percentage
          - High I/O utilization
          - Slow response times
          ==========================================

    # ==========================================================
    # TASK 6.33: Show filesystem limits
    # ==========================================================
    - name: 6.33 - Show filesystem limits
      ansible.builtin.debug:
        msg: |
          ==========================================
          FILESYSTEM LIMITS
          ==========================================
          
          ext4 Limits:
          - Max filesystem size: 16TB
          - Max file size: 16TB
          - Max files: Billions
          - Max filename: 255 bytes
          
          xfs Limits:
          - Max filesystem size: 8EB
          - Max file size: 8EB
          - Max files: Billions
          - Max filename: 255 bytes
          
          Inode Size:
          - ext4 default: 256 bytes
          - Can increase to 4KB
          - Larger inodes for extended attributes
          
          Block Size:
          - Default: 4KB
          - Can use 1KB, 2KB, 4KB, 8KB
          - Larger blocks for big files
          - Smaller blocks for small files
          
          When to change:
          - Many small files: Smaller blocks
          - Large files: Larger blocks
          - Many extended attributes: Larger inodes
          ==========================================

    # ==========================================================
    # TASK 6.34: Display common partition layouts
    # ==========================================================
    - name: 6.34 - Display common partition layouts
      ansible.builtin.debug:
        msg: |
          ==========================================
          COMMON PARTITION LAYOUTS
          ==========================================
          
          Desktop/Laptop (Minimal):
          /dev/sda1  /       20GB ext4
          /dev/sda2  swap    4GB
          /dev/sda3  /home   Rest
          
          Server (Recommended):
          /dev/sda1  /       30GB ext4
          /dev/sda2  /boot   1GB ext4
          /dev/sda3  /var    10GB ext4
          /dev/sda4  /home   Large ext4
          swap       swap    4GB
          
          Enterprise (Advanced):
          /dev/sda1  /       30GB RAID 1
          /dev/sda2  /boot   1GB RAID 1
          /dev/sdb   /var    RAID 5
          /dev/sdc   /home   RAID 5
          LVM        Additional volumes
          
          Database Server:
          /dev/sda1  /       RAID 1
          /dev/sdb   /var/lib/mysql RAID 5 (fast)
          /dev/sdc   /backup RAID 5 (big)
          
          High-Availability:
          Multiple disks per mount
          RAID 1 for critical filesystems
          RAID 5/6 for data
          Snapshots for backups
          ==========================================

    # ==========================================================
    # TASK 6.35 through 6.45: Final summary tasks
    # ==========================================================
    - name: 6.35 - Show LVM management
      ansible.builtin.debug:
        msg: |
          ==========================================
          LVM MANAGEMENT COMMANDS
          ==========================================
          
          Create:
          pvcreate /dev/sdb
          vgcreate myvg /dev/sdb
          lvcreate -L 10G -n mylv myvg
          mkfs.ext4 /dev/myvg/mylv
          mount /dev/myvg/mylv /mnt/data
          
          View:
          pvs, pvdisplay          (physical volumes)
          vgs, vgdisplay          (volume groups)
          lvs, lvdisplay          (logical volumes)
          
          Resize:
          lvextend -L +5G /dev/myvg/mylv
          resize2fs /dev/myvg/mylv
          
          Snapshots:
          lvcreate -L 1G -s -n snap /dev/myvg/mylv
          mount /dev/myvg/snap /mnt/snapshot
          
          Delete:
          umount /dev/myvg/mylv
          lvremove /dev/myvg/mylv
          vgremove myvg
          pvremove /dev/sdb
          ==========================================

